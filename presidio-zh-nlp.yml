nlp_engine_name: spacy
models:
  - lang_code: zh
    model_name: zh_core_web_sm

ner_model_configuration:
  model_to_presidio_entity_mapping:
    PER: PERSON
    PERSON: PERSON
    LOC: LOCATION
    LOCATION: LOCATION
    GPE: LOCATION
    ORG: ORGANIZATION
    DATE: DATE_TIME
    TIME: DATE_TIME

  low_confidence_score_multiplier: 0.4
  low_score_entity_names:
    - ORGANIZATION
    - ORG
  default_score: 0.85